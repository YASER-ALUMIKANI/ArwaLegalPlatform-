<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- التدرج اللوني الملكي الذهبي -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9d976" />
      <stop offset="50%" stop-color="#c5a059" />
      <stop offset="100%" stop-color="#9b7c3e" />
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1b2a4a" />
      <stop offset="100%" stop-color="#0b0f19" />
    </radialGradient>
  </defs>
  <!-- الخلفية الداكنة الفاخرة -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="8" />
  
  <!-- أيقونة ميزان العدالة (رموز بصرية للملكة أروى ومنصة العدالة) -->
  <g transform="translate(128, 128) scale(0.5)">
    <!-- العمود الرئيسي للميزان -->
    <rect x="236" y="80" width="40" height="340" rx="10" fill="url(#goldGrad)" />
    <!-- القاعدة السفلى للميزان -->
    <path d="M 140 420 L 372 420 A 20 20 0 0 1 372 450 L 140 450 A 20 20 0 0 1 140 420 Z" fill="url(#goldGrad)" />
    <!-- العارضة العلوية الأفقية للميزان -->
    <path d="M 60 110 C 60 110, 256 60, 452 110 A 10 10 0 0 1 452 130 C 452 130, 256 90, 60 130 A 10 10 0 0 1 60 110 Z" fill="url(#goldGrad)" />
    <!-- النقطة المركزية للعارضة -->
    <circle cx="256" cy="110" r="30" fill="url(#goldGrad)" />
    
    <!-- الكفة اليمنى للميزان -->
    <!-- السلاسل الحاملة -->
    <line x1="80" y1="130" x2="30" y2="280" stroke="url(#goldGrad)" stroke-width="4" />
    <line x1="80" y1="130" x2="130" y2="280" stroke="url(#goldGrad)" stroke-width="4" />
    <!-- الصحن -->
    <path d="M 20 280 L 140 280 Q 80 340, 20 280" fill="url(#goldGrad)" />

    <!-- الكفة اليسرى للميزان -->
    <!-- السلاسل الحاملة -->
    <line x1="432" y1="130" x2="382" y2="280" stroke="url(#goldGrad)" stroke-width="4" />
    <line x1="432" y1="130" x2="482" y2="280" stroke="url(#goldGrad)" stroke-width="4" />
    <!-- الصحن -->
    <path d="M 372 280 L 492 280 Q 432 340, 372 280" fill="url(#goldGrad)" />
  </g>
</svg>
