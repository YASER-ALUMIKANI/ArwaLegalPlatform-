<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0f19" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>منصة أروى القانونية الرقمية</title>
    <!-- استيراد خطوط Google Fonts لدعم العربية بجمالية عالية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- تسجيل الـ Service Worker برمجياً لتفعيل الـ PWA (يتجاوز المطورين محلياً لتجنب مشاكل كاش التعديلات) -->
    <script>
      if ('serviceWorker' in navigator) {
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
          navigator.serviceWorker.getRegistrations().then(registrations => {
            for (let registration of registrations) {
              registration.unregister().then(boolean => {
                if (boolean) console.log('تم إلغاء تسجيل Service Worker محلياً لتحديث الكود.');
              });
            }
          });
        } else {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
              .then(reg => console.log('تم تسجيل الـ Service Worker بنجاح:', reg.scope))
              .catch(err => console.error('فشل تسجيل الـ Service Worker:', err));
          });
        }
      }
    </script>
  </body>
</html>
